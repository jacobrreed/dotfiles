[character]
success_symbol = '[➜](bold green)'
error_symbol = '[ ➜](bold red)'

[git_branch]
format = "[ $branch(:$remote_branch)](purple) "

[git_status]
format = "([⎡$all_status$ahead_behind⎤](blue) )"
ahead = "[▴](green)"
behind = "[▿](red)"
stashed = "[](italic white)"
modified = "[ ](green)"
diverged = "[◇](orange)"
untracked = "[◌](yellow)"
conflicted = "[󱃟 ](red)"
renamed = "[◎](orange)"
deleted = "[✘](italic red)"
staged = "[▪](green)"

[username]
show_always = false
style_root = "bold blue"
style_user = "bold green"
format = "[$user]($style)[@](italic yellow)"

[hostname]
ssh_only = true
trim_at = ""
ssh_symbol = "󰣀 "
style = "bold blue"
format = "[$ssh_symbol$hostname]($style)"

[localip]
ssh_only = true
format = "[$localipv4]($style)\n"
style = "italic yellow"

[cmd_duration]
min_time = 1_000
show_milliseconds = false
format = "[$duration  ]($style)"

[package]
disabled = true

