[character] 
success_symbol = '[‚ûú](bold green)'
error_symbol =  '[‚ûú](bold red)'

[git_branch]
format="[Óôù $branch(:$remote_branch)](purple) "

[git_status]
format="([‚é°$all_status$ahead_behind‚é§](blue) )"
ahead="[‚ñ¥](green)"
behind = "[‚ñø](red)"
stashed = "[](italic white)"
modified = "[Ó≠É ](green)"
diverged = "[‚óá](orange)"
untracked = "[‚óå](yellow)"
conflicted = "[Û±Éü ](red)"
renamed = "[‚óé](orange)"
deleted = "[‚úò](italic red)"
staged = "[‚ñ™](green)"

[username]
show_always=false
style_root="bold blue"
style_user="bold green"
format="[$user]($style)[@](italic yellow)"

[hostname]
ssh_only=true
trim_at=""
ssh_symbol="Û∞£Ä "
style="bold blue"
format="[$ssh_symbol$hostname]($style)"

[localip]
ssh_only=true
format="[$localipv4]($style)\n"
style="italic yellow"

[cmd_duration]
min_time=1_000
show_milliseconds=false
format="[$duration Ôê∫ ]($style)"

