# ██╗███╗   ███╗██████╗  ██████╗ ██████╗ ████████╗███████╗
# ██║████╗ ████║██╔══██╗██╔═══██╗██╔══██╗╚══██╔══╝██╔════╝
# ██║██╔████╔██║██████╔╝██║   ██║██████╔╝   ██║   ███████╗
# ██║██║╚██╔╝██║██╔═══╝ ██║   ██║██╔══██╗   ██║   ╚════██║
# ██║██║ ╚═╝ ██║██║     ╚██████╔╝██║  ██║   ██║   ███████║
# ╚═╝╚═╝     ╚═╝╚═╝      ╚═════╝ ╚═╝  ╚═╝   ╚═╝   ╚══════╝
# nwg-displays pregenerated
source = ~/.config/hypr/monitors.conf
# Catch all for monitors not in nwg-displays config
monitor=,preferred,auto,1
# nwg-display pregenerated
source = ~/.config/hypr/workspaces.conf

# ███████╗███╗   ██╗██╗   ██╗
# ██╔════╝████╗  ██║██║   ██║
# █████╗  ██╔██╗ ██║██║   ██║
# ██╔══╝  ██║╚██╗██║╚██╗ ██╔╝
# ███████╗██║ ╚████║ ╚████╔╝ 
# ╚══════╝╚═╝  ╚═══╝  ╚═══╝  
# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia # Hardware Acceleration
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct # VA-API hardware video acceleration
# Electron
env = ELECTRON_OZONE_PLATFORM_HINT,auto
# Wayland/Hyprland
env = GDK_SCALE, 1
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
# Nvidia VAAPI Firefox
env = MOZ_DISABLE_RDD_SANDBOX,1


# ███████╗██╗  ██╗███████╗ ██████╗
# ██╔════╝╚██╗██╔╝██╔════╝██╔════╝
# █████╗   ╚███╔╝ █████╗  ██║     
# ██╔══╝   ██╔██╗ ██╔══╝  ██║     
# ███████╗██╔╝ ██╗███████╗╚██████╗
# ╚══════╝╚═╝  ╚═╝╚══════╝ ╚═════╝
exec-once=uwsm app -- dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=uwsm app -- cb
exec-once=uwsm app -- hyprpanel
#exec-once=killall -q spotify_player && spotify_player -d
#exec-once=kitty --title 'spotify_player' --app-id 'spotify_player' --session spotify.conf -o tab_bar_style=hidden 
exec-once=uwsm app -- spotify-launcher
exec-once=uwsm app -- vesktop
exec-once=uwsm app -- swww-daemon
exec-once=uwsm app -- ~/.config/swww/random.sh
exec-once=uwsm app -- hypridle
exec-once=uwsm app -- udiskie
exec-once=uwsm app -- steam
exec-once=uwsm app -- walker --gapplication-service

# ██████╗ ██╗   ██╗██╗     ███████╗███████╗
# ██╔══██╗██║   ██║██║     ██╔════╝██╔════╝
# ██████╔╝██║   ██║██║     █████╗  ███████╗
# ██╔══██╗██║   ██║██║     ██╔══╝  ╚════██║
# ██║  ██║╚██████╔╝███████╗███████╗███████║
# ╚═╝  ╚═╝ ╚═════╝ ╚══════╝╚══════╝╚══════╝
# Window Rules
windowrule=workspace 3 silent,^(vesktop)$
windowrule=workspace 3 silent,^(Spotify)$
windowrule=workspace 3 silent,^(spotify_player)$
windowrule=workspace 3 silent,^(spotify)$
windowrule=workspace 4 silent,^(obsidian)$
windowrule=workspace 10 silent,^(steam)$

# Steam
# gamescope
windowrulev2 = fullscreen,class:^gamescope$
windowrulev2 = fullscreen,class:^steam_app\d+$
windowrulev2 = workspace 10 silent,class:^steam_app_\d+$
workspace = 10, border:false, rounding:false

# Spotify/Vesktop Monitor 3
workspace = 3, layoutopt:orientation:top, layoutopt:mfact:0.3

# ██████╗ ██╗███╗   ██╗██████╗ ███████╗
# ██╔══██╗██║████╗  ██║██╔══██╗██╔════╝
# ██████╔╝██║██╔██╗ ██║██║  ██║███████╗
# ██╔══██╗██║██║╚██╗██║██║  ██║╚════██║
# ██████╔╝██║██║ ╚████║██████╔╝███████║
# ╚═════╝ ╚═╝╚═╝  ╚═══╝╚═════╝ ╚══════╝
$mod = SUPER
bind = $mod + SHIFT, q, exit
# App Binds
bind = $mod, Return, exec, uwsm app -- kitty
bind = $mod, delete, exec, pgrep -x wlogout > /dev/null 2>&1 && killall wlogout || wlogout --protocol layer-shell -b 5 -s -c 50  -T 400 -B 400
bind = $mod+shift, delete, exec, uwsm app -- hyprlock
bind = $mod, q, killactive,
bind = $mod, b, exec, uwsm app -- firefox-developer-edition
bind = $mod, Space, exec, uwsm app -- walker --modules applications
bind = alt, tab, exec,uwsm app --  walker --modules windows
bind = $mod + SHIFT, c, exec, pgrep -x hyprpicker > /dev/null 2>&1 && killall hyprpicker || hyprpicker -a -f hex -r
# Window Management
bind = $mod + SHIFT, Space, togglefloating,
bind = $mod, p, pseudo,
bind = $mod, v, togglesplit,
bind = $mod, f, fullscreen, 0
# Screenshot
bind=,Print,exec, uwsm app -- grim -g "$(slurp -d)" - | wl-copy
bind=SHIFT,Print, exec, uwsm app -- grim -g "$(slurp)" - | swappy -f -
# Clipboard
bind = $mod + SHIFT, v, exec,uwsm app -- walker --modules clipboard 
# Emojis
bind = $mod, F12, exec, uwsm app -- walker --modules emojis
# Websearch
bind = $mod + SHIFT, b, exec,uwsm app -- walker --modules websearch
# Symbols
bind = $mod, F11, exec, uwsm app -- walker --modules symbols
# Finder
bind = $mod + SHIFT, f, exec, uwsm app -- walker --modules finder
# Move focus with mainMod + arrow keys
bind = $mod, h, movefocus, l
bind = $mod, left, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod + SHIFT, h, movewindow, l
bind = $mod + SHIFT, left, movewindow, l
bind = $mod + SHIFT, l, movewindow, r
bind = $mod + SHIFT, k, movewindow, u
bind = $mod + SHIFT, j, movewindow, d
bind = $mod + SHIFT, right, movewindow, r
bind = $mod + SHIFT, up, movewindow, u
bind = $mod + SHIFT, down, movewindow, d
# Switch workspaces with mainMod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, s, workspace, 10
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9
bind = $mod SHIFT, s, movetoworkspacesilent, 10
# Scroll through existing workspaces with mainMod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
# Resize Toggle mapping
bind=$mod SHIFT,R,submap,resize # will switch to a submap called resize
submap=resize # will start a submap called "resize"
binde=,right,resizeactive,20 0
binde=,left,resizeactive,-20 0
binde=,up,resizeactive,0 -20
binde=,down,resizeactive,0 20
binde=,l,resizeactive,20 0
binde=,h,resizeactive,-20 0
binde=,k,resizeactive,0 -20
binde=,j,resizeactive,0 20
bind=,escape,submap,reset # use reset to go back to the global submap
submap=reset
# End of Resize toggle mapping
# Audio FN key mappings
bind=,XF86AudioMute,exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind=,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind=,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind=,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind=,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindl=, XF86AudioPlay, exec, playerctl play-pause
bindl=, XF86AudioNext, exec, playerctl next 
bindl=, XF86AudioPrev, exec, playerctl previous
# Brightness FN keys
bind=,XF86MonBrightnessUp, exec, sudo light -A 10
bind=,XF86MonBrightnessDown, exec, sudo light -U 10


